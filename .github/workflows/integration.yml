name: 'Integration Testing'
on: [push, pull_request]

jobs:
  msys2:
    runs-on: windows-latest
    defaults:
      run:
        shell: msys2 {0}
    strategy:
      matrix:
        include:
          - { sys: msys2,                                 compiler: gcc}
          - { sys: mingw64, env: mingw-w64-x86_64-,       compiler: gcc }
          - { sys: mingw32, env: mingw-w64-i686-,         compiler: gcc }
          - { sys: ucrt64,  env: mingw-w64-ucrt-x86_64-,  compiler: clang }
          - { sys: clang64, env: mingw-w64-clang-x86_64-, compiler: clang }
          - { sys: clang32, env: mingw-w64-clang-i686-,   compiler: clang }
    steps:
      - uses: msys2/setup-msys2@v2
        with:
          msystem: ${{matrix.sys}}
          update: true
          install: >-
            groff
            pactoys
            dos2unix
            ${{matrix.env}}${{matrix.compiler}}
            ${{matrix.env}}meson
            ${{matrix.env}}ninja
            ${{matrix.env}}pkg-config
      - uses: actions/checkout@v3.3.0
      - uses: actions/checkout@v3.3.0
        with:
          repository: guijan/dictpw
          path: dictpw
      - name: shared test
        run: |
          meson setup -Dprovide_libbsd=true build
          meson install -C build
          cd dictpw
          meson setup build
          meson compile -C build
      - name: static test
        run: |
          meson setup -Dprovide_libbsd=true -Ddefault_library=static --wipe \
              build
          meson install -C build
          cd dictpw
          meson setup -Dstatic_deps=true build
          meson compile -C build
      - uses: actions/upload-artifact@v3.1.2
        if: always()
        with:
          name: meson-logs-int-${{matrix.sys}}
          path: |
            build/meson-logs
